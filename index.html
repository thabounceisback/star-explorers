/* ══════════════════════════════════════════

// Center-point of each space in SVG units

const PC = ['#dc2626','#2563eb','#16a34a','#d97706'];
const PE = ['🚀','🛸','⭐','🌙'];
const rndCard = () => SE_CARDS[Math.floor(Math.random() * SE_CARDS.length)];
const mkPl = (name, i) => ({ id:i, name, pos:0, coins:0, hearts:3, hasWeapon:false, hasWaterPotion:false, skipTurn:false });

function Board({ players }) {
  const byPos = {};
  players.forEach((p, i) => { if (!byPos[p.pos]) byPos[p.pos] = []; byPos[p.pos].push(i); });

  const pathPts = SPACE_POS.map(([x,y]) => `${x},${y}`).join(' ');

  return (
    <div style={{ position:'relative', paddingBottom:`${BH/BW*100}%`,
      background:'#2d6a4f', borderRadius:12,
      border:'4px solid #1b4332', boxShadow:'0 6px 20px rgba(0,0,0,0.35)',
      marginBottom:8 }}>
      <div style={{ position:'absolute', inset:0 }}>

        {/* ── SVG BACKGROUND ── */}
        <svg viewBox={`0 0 ${BW} ${BH}`} width="100%" height="100%"
          style={{ position:'absolute', inset:0 }}>

          {/* Grass texture dots */}
          {[[55,250],[90,330],[200,350],[240,430],[160,420],[280,300],[30,290],[180,460]].map(([x,y],i)=>(
            <circle key={i} cx={x} cy={y} r="3" fill="#22543d" opacity="0.4"/>
          ))}
          {/* Trees */}
          {[[70,470],[230,350],[155,330],[290,390],[20,340]].map(([x,y],i)=>(
            <g key={i}>
              <polygon points={`${x},${y-16} ${x-9},${y} ${x+9},${y}`} fill="#166534" opacity="0.55"/>
              <rect x={x-2} y={y} width="4" height="5" fill="#92400e" opacity="0.55"/>
            </g>
          ))}

          {/* ── OCEAN REGION ── */}
          <ellipse cx="184" cy="180" rx="118" ry="26" fill="#1e40af" opacity="0.55"/>
          <ellipse cx="184" cy="180" rx="118" ry="26" fill="none" stroke="#93c5fd" strokeWidth="1" opacity="0.5"/>
          {/* wave lines */}
          <path d="M 80 172 Q 100 168 120 172 Q 140 176 160 172 Q 180 168 200 172 Q 220 176 240 172 Q 260 168 280 172"
            fill="none" stroke="#93c5fd" strokeWidth="1.2" opacity="0.55"/>
          <path d="M 80 182 Q 100 178 120 182 Q 140 186 160 182 Q 180 178 200 182 Q 220 186 240 182 Q 260 178 280 182"
            fill="none" stroke="#93c5fd" strokeWidth="1.2" opacity="0.45"/>
          <text x="184" y="167" textAnchor="middle" fill="#bfdbfe"
            fontSize="7" fontFamily="'Patrick Hand',cursive" letterSpacing="1">OCEAN</text>

          {/* ── LAVA / FINNO ROOM REGION ── */}
          <rect x="28" y="22" width="260" height="74" rx="10" fill="#1c1917" opacity="0.82"/>
          {/* lava blobs */}
          <ellipse cx="80" cy="62" rx="22" ry="8" fill="#dc2626" opacity="0.4"/>
          <ellipse cx="160" cy="55" rx="30" ry="9" fill="#dc2626" opacity="0.3"/>
          <ellipse cx="240" cy="60" rx="20" ry="7" fill="#dc2626" opacity="0.35"/>
          <text x="155" y="34" textAnchor="middle" fill="#fca5a5"
            fontSize="7.5" fontFamily="'Patrick Hand',cursive" letterSpacing="0.5">☁️ THE FINNO ROOM — LAVA ☁️</text>

          {/* ── PATH LINE ── */}
          <polyline points={pathPts} fill="none"
            stroke="rgba(255,255,255,0.28)" strokeWidth="3.5"
            strokeLinecap="round" strokeLinejoin="round"
            strokeDasharray="6 3"/>

          {/* Arrow hints at turn corners */}
          {[[40,378,90],[260,224,180],[44,114,270]].map(([x,y,rot],i)=>(
            <text key={i} x={x} y={y} fontSize="8" fill="rgba(255,255,255,0.3)"
              textAnchor="middle" transform={`rotate(${rot},${x},${y})`}>▲</text>
          ))}
        </svg>

        {/* ── SPACE TILES ── */}
        {SPACES.map((sp, sid) => {
          const [cx, cy] = SPACE_POS[sid];
          const isFin = sid === 28;
          const sz = isFin ? CELL + 14 : CELL;
          const here = byPos[sid] || [];
          const hot = here.length > 0;
          return (
            <div key={sid} style={{
              position:'absolute',
              left:`${(cx - sz/2) / BW * 100}%`,
              top:`${(cy - sz/2) / BH * 100}%`,
              width:`${sz / BW * 100}%`,
              height:`${sz / BH * 100}%`,
              background: sp.bg,
              border:`${hot ? 2.5 : 1.5}px solid ${hot ? '#f59e0b' : sp.bd}`,
              borderRadius: isFin ? '6px' : '4px',
              display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center',
              overflow:'hidden',
              boxShadow: isFin ? '0 0 10px rgba(220,38,38,0.7)' : hot ? '0 0 7px rgba(245,158,11,0.9)' : '0 1px 4px rgba(0,0,0,0.25)',
              zIndex: hot ? 3 : isFin ? 2 : 1,

              <div style={{ position:'absolute', top:1, left:2, lineHeight:1,
                fontSize:'clamp(0.28rem, 0.9vw, 0.35rem)',

                fontFamily:'monospace' }}>{sid}</div>

              {/* Label */}
              <div style={{
                ...hand,
                fontSize: isFin ? 'clamp(0.38rem, 1.2vw, 0.52rem)' : 'clamp(0.32rem, 1vw, 0.44rem)',
                color: sp.fg, textAlign:'center', lineHeight:1.15,
                whiteSpace:'pre', fontWeight: isFin ? 700 : 400,
              }}>{sp.label}</div>

              {/* Player tokens */}
              {hot && (
                <div style={{ display:'flex', gap:1, justifyContent:'center',
                  marginTop:1, flexWrap:'wrap', position:'absolute', bottom:2 }}>
                  {here.map(pi => (
                    <div key={pi} style={{
                      width:'clamp(5px,1.6vw,7px)', height:'clamp(5px,1.6vw,7px)',
                      borderRadius:'50%', background:PC[pi],
                      border:'1px solid white', boxShadow:'0 1px 3px rgba(0,0,0,0.5)',
                    }}/>
                  ))}
                </div>
              )}
            </div>
          );
        })}

        {/* Ocean label */}
        <div style={{ position:'absolute', bottom:'1%', left:0, right:0,
          textAlign:'center', ...hand, fontSize:'clamp(0.45rem,1.3vw,0.6rem)',
          color:'rgba(255,255,255,0.5)', letterSpacing:'0.05em' }}>
          🌊 above water: go back 3 · dive: −1❤️ 🌊
        </div>
      </div>
    </div>
  );
}

function StarExplorers() {
  const [screen,     setScreen]     = useState('setup');
  const [nameInputs, setNameInputs] = useState(['Player 1','Player 2','Player 3','Player 4']);
  const [numP,       setNumP]       = useState(2);
  const [players,    setPlayers]    = useState([]);
  const [turn,       setTurn]       = useState(0);
  const [dice,       setDice]       = useState('?');
  const [rolling,    setRolling]    = useState(false);
  const [modal,      setModal]      = useState(null);
  const [mdata,      setMdata]      = useState(null);
  const [log,        setLog]        = useState([]);
  const [winner,     setWinner]     = useState(null);

  const lg = (msg) => setLog(l => [msg, ...l].slice(0, 30));

  const startGame = () => {
    setPlayers(nameInputs.slice(0, numP).map((n, i) => mkPl(n || `Player ${i+1}`, i)));
    setTurn(0); setLog(['🚀 Star Explorers has begun!']);
    setDice('?'); setWinner(null); setModal(null); setMdata(null);
    setScreen('game');
  };

  const checkDeaths = (ps) => ps.map(p => {
    if (p.hearts <= 0) { lg(`💀 ${p.name} runs out of hearts — back to START!`); return { ...p, hearts:3, pos:0 }; }
    return p;
  });

  const endTurn = () => { setModal(null); setMdata(null); setTurn(t => (t+1) % (players.length||1)); };

  const land = (pi, pos, ps, depth=0) => {
    if (depth > 5) { endTurn(); return; }
    const sp = SPACES[pos];
    let nps = ps.map(p => ({...p}));
    if (sp.type==='coin')  { nps[pi].coins+=sp.v; lg(`${nps[pi].name} lands on +${sp.v}🪙!`); setPlayers(nps); endTurn(); }
    else if (sp.type==='dmg')   { nps[pi].hearts-=sp.v; lg(`${nps[pi].name} takes ${sp.v}💔!`); nps=checkDeaths(nps); setPlayers(nps); endTurn(); }
    else if (sp.type==='back')  { const np=Math.max(0,pos-sp.v); nps[pi].pos=np; lg(`${nps[pi].name} sent back ${sp.v} → space ${np}!`); setPlayers(nps); land(pi,np,nps,depth+1); }
    else if (sp.type==='warp')  { const np=sp.to; nps[pi].pos=np; lg(`${nps[pi].name} warps to space ${np}! ✨`); setPlayers(nps); land(pi,np,nps,depth+1); }
    else if (sp.type==='shop')  { setPlayers(nps); setMdata({pi,ps:nps}); setModal('shop'); }
    else if (sp.type==='ocean') { setPlayers(nps); setMdata({pi,pos,ps:nps}); setModal('ocean'); }
    else if (sp.type==='fork')  { setPlayers(nps); setMdata({pi,ps:nps}); setModal('fork'); }
    else if (sp.type==='finno') { setPlayers(nps); setMdata({pi}); setModal('finno_land'); }
    else { setPlayers(nps); endTurn(); }
  };

  const applyCard = (card, pi, ps) => {
    const eff = card.eff;
    let nps = ps.map(p => ({...p}));
    if (eff==='move') {
      nps[pi].pos=Math.min(28,nps[pi].pos+card.v);
      lg(`${nps[pi].name}: ${card.name} → moves to space ${nps[pi].pos}!`);
      nps=checkDeaths(nps); setPlayers(nps); land(pi,nps[pi].pos,nps); return;
    }
    if      (eff==='dmg')        { nps[pi].hearts-=card.v; lg(`${nps[pi].name}: ${card.name} → -${card.v}❤️`); }
    else if (eff==='shark')      { nps[pi].coins+=1; nps[pi].hearts-=1; lg(`${nps[pi].name}: Shark Attack → +1🪙 -1❤️`); }
    else if (eff==='coin')       { nps[pi].coins+=card.v; lg(`${nps[pi].name}: ${card.name} → +${card.v}🪙`); }
    else if (eff==='losecoin')   { nps[pi].coins=Math.max(0,nps[pi].coins-card.v); lg(`${nps[pi].name}: ${card.name} → -${card.v}🪙`); }
    else if (eff==='heal')       { nps[pi].hearts+=card.v; lg(`${nps[pi].name}: ${card.name} → +${card.v}❤️`); }
    else if (eff==='item_water') { nps[pi].hasWaterPotion=true; lg(`${nps[pi].name} found a Water Potion! 💧`); }
    else if (eff==='item_sword') { nps[pi].hasWeapon=true; lg(`${nps[pi].name} found a Sword! 🗡️`); }
    else if (eff==='skip')       { nps[pi].skipTurn=true; lg(`${nps[pi].name} must skip next turn!`); }
    else if (eff==='storm')      { nps=nps.map(p=>({...p,hearts:p.hearts-1})); lg('🍌 Banana Storm! Everyone loses 1 heart!'); }
    else if (eff==='attack')     { nps=checkDeaths(nps); setPlayers(nps); setMdata({pi,ps:nps}); setModal('attack'); return; }
    else if (eff==='draw_again') {
      nps=checkDeaths(nps); setPlayers(nps);
      const nc=rndCard(); lg(`📬 ${nps[pi].name} draws again: ${nc.name}!`);
      setMdata({card:nc,pi,ps:nps}); setModal('card'); return;
    }
    nps=checkDeaths(nps); setPlayers(nps); endTurn();
  };

  const doRoll = () => {
    if (rolling||modal) return;
    const cp=players.map(p=>({...p})), ct=turn;
    setRolling(true);
    let ticks=0;
    const iv=setInterval(()=>{
      setDice(Math.floor(Math.random()*10));
      if(++ticks>=14){ clearInterval(iv); const f=Math.floor(Math.random()*10); setDice(f); setRolling(false); onRoll(f,cp,ct); }
    },65);
  };

  const onRoll = (roll, ps, ti) => {
    const p=ps[ti]; lg(`🎲 ${p.name} rolls a ${roll}!`);
    if (p.skipTurn) { setPlayers(ps.map((pl,i)=>i===ti?{...pl,skipTurn:false}:pl)); lg(`${p.name} skips their turn!`); setTurn((ti+1)%ps.length); return; }
    if (p.pos===28) {
      if (roll===9)  { lg(`🎉 ${p.name} defeats the dragon and WINS!`); setWinner(p); setScreen('win'); }
      else if (roll===0) { const c=rndCard(); setMdata({card:c,pi:ti,ps}); setModal('card'); }
      else { lg(`${p.name} needs a 9 to win! (rolled ${roll})`); setTurn((ti+1)%ps.length); }
      return;
    }
    if (roll===0) { const c=rndCard(); lg(`${p.name} rolled 0 — SE card: ${c.name}!`); setMdata({card:c,pi:ti,ps}); setModal('card'); return; }
    const np=Math.min(28,p.pos+roll);
    setPlayers(ps.map((pl,i)=>i===ti?{...pl,pos:np}:pl));
    lg(`${p.name} moves to space ${np}`);
    land(ti,np,ps.map((pl,i)=>i===ti?{...pl,pos:np}:pl));
  };

  const Btn = ({ children, onClick, disabled, style={} }) => (
    <button onClick={onClick} disabled={disabled} style={{
      ...sans, fontWeight:800, borderRadius:10, border:'none', color:'#fff',
      cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.6 : 1,
      ...style
    }}>{children}</button>
  );

  const ModalWrap = ({ children }) => (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:50, padding:16 }}>
      <div style={{ background:'#fff', border:'3px solid #e5e7eb', borderRadius:18,
        padding:'24px 22px', width:'min(380px,93vw)', textAlign:'center',
        maxHeight:'88vh', overflowY:'auto', boxShadow:'0 20px 48px rgba(0,0,0,0.25)' }}>
        {children}
      </div>
    </div>
  );

  /* ── WIN ── */
  if (screen==='win') return (
    <div style={{ background:'#f5f0e8', minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ textAlign:'center', maxWidth:400, width:'100%' }}>
        <div style={{ fontSize:'4rem' }}>🏆</div>
        <h1 style={{ ...hd, fontSize:'2.5rem', color:'#b45309', margin:'8px 0' }}>{winner?.name} WINS!</h1>
        <p style={{ ...sans, color:'#6b7280', marginBottom:20 }}>The dragon has been defeated! 🐉✨</p>
        <div style={{ background:'#fff', border:'2px solid #e5e7eb', borderRadius:12, padding:'14px 18px', marginBottom:20, textAlign:'left' }}>
          {players.map((p,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0',
              borderBottom:i<players.length-1?'1px solid #f3f4f6':'none', color:p.id===winner?.id?'#b45309':'#9ca3af' }}>
              <span>{PE[i]}</span>
              <span style={{ ...sans, fontWeight:800, flex:1 }}>{p.name}</span>
              <span style={{ ...sans, fontSize:'0.85rem' }}>❤️{p.hearts} 🪙{p.coins}</span>
              {p.id===winner?.id&&<span>👑</span>}
            </div>
          ))}
        </div>
        <Btn onClick={()=>setScreen('setup')} style={{ background:'linear-gradient(135deg,#16a34a,#059669)', padding:'12px 36px', fontSize:'1.05rem' }}>
          🚀 Play Again
        </Btn>
      </div>
    </div>
  );

  /* ── SETUP ── */
  if (screen==='setup') return (
    <div style={{ background:'#f5f0e8', minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div style={{ width:'min(400px,96vw)', textAlign:'center' }}>
        <div style={{ fontSize:'3.5rem', lineHeight:1, marginBottom:6 }}>⭐</div>
        <h1 style={{ ...hd, fontSize:'2.6rem', color:'#b45309', margin:'0 0 4px' }}>STAR EXPLORERS</h1>
        <p style={{ ...sans, color:'#6b7280', marginBottom:22 }}>Race to the Finno Room and defeat the dragon!</p>
        <div style={{ background:'#fff', border:'3px solid #e5e7eb', borderRadius:14, padding:'20px 18px' }}>
          <div style={{ marginBottom:16 }}>
            <div style={{ ...sans, fontWeight:700, marginBottom:8, textAlign:'left', fontSize:'0.78rem', color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.06em' }}>Number of Players</div>
            <div style={{ display:'flex', gap:8 }}>
              {[2,3,4].map(n=>(
                <button key={n} onClick={()=>setNumP(n)} style={{
                  flex:1, padding:'10px 0', borderRadius:10,
                  border:`3px solid ${numP===n?PC[n-2]:'#e5e7eb'}`,
                  background:numP===n?'#dcfce7':'#f9fafb',
                  color:numP===n?'#166534':'#374151',
                  fontSize:'1.3rem', cursor:'pointer', fontWeight:700,
                  ...hd, transition:'all 0.2s'
                }}>{n}</button>
              ))}
            </div>
          </div>
          {Array.from({length:numP}).map((_,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
              <span style={{ fontSize:'1.4rem' }}>{PE[i]}</span>
              <input value={nameInputs[i]}
                onChange={e=>setNameInputs(n=>n.map((x,j)=>j===i?e.target.value:x))}
                placeholder={`Player ${i+1} name`}
                style={{ ...sans, flex:1, padding:'9px 12px', borderRadius:8, border:'2px solid #e5e7eb', background:'#f9fafb', color:'#111827', fontSize:'1rem', outline:'none' }}/>
            </div>
          ))}
          <Btn onClick={startGame} style={{ width:'100%', marginTop:10, padding:'14px 0', fontSize:'1.15rem', background:'linear-gradient(135deg,#16a34a,#059669)', boxShadow:'0 4px 12px rgba(22,163,74,0.35)' }}>
            🚀 Launch Game!
          </Btn>
        </div>
        <p style={{ ...sans, marginTop:14, fontSize:'0.72rem', color:'#9ca3af', lineHeight:1.7 }}>
          Roll 1–9 to move · Roll 0 = draw SE card · Reach 🐉 then roll a 9 to win · Shop at space 9
        </p>
      </div>
    </div>
  );

  /* ── GAME ── */
  const curP = players[turn];
  return (
    <div style={{ background:'#f5f0e8', minHeight:'100vh', padding:'8px 10px 20px', maxWidth:520, margin:'0 auto' }}>

      <div style={{ textAlign:'center', padding:'5px 0 4px' }}>
        <span style={{ ...hd, fontSize:'1.3rem', color:'#b45309' }}>⭐ STAR EXPLORERS ⭐</span>
      </div>

      <Board players={players} />

      {/* Player cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6, marginBottom:8 }}>
        {players.map((p,i)=>(
          <div key={i} style={{
            background:'#fff', borderRadius:10, padding:'8px 10px',
            border:`2.5px solid ${i===turn?PC[i]:'#e5e7eb'}`,
            boxShadow:i===turn?`0 0 10px ${PC[i]}55`:'0 1px 4px rgba(0,0,0,0.08)',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:3 }}>
              <span>{PE[i]}</span>
              <span style={{ ...sans, fontWeight:800, fontSize:'0.82rem', color:PC[i], flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.name}</span>
              {i===turn&&<span style={{ ...sans, fontSize:'0.52rem', background:PC[i], borderRadius:6, padding:'1px 5px', color:'#fff', flexShrink:0 }}>NOW</span>}
            </div>
            <div style={{ ...sans, fontSize:'0.79rem', display:'flex', gap:8, flexWrap:'wrap' }}>
              <span>{'❤️'.repeat(Math.min(5,Math.max(0,p.hearts)))}{p.hearts>5?`+${p.hearts-5}`:''}{p.hearts<=0?'💀':''}</span>
              <span>🪙{p.coins}</span>
            </div>
            <div style={{ display:'flex', gap:3, marginTop:3 }}>
              {p.hasWeapon&&<span style={{ ...sans, fontSize:'0.58rem', background:'#f3f4f6', border:'1px solid #e5e7eb', borderRadius:4, padding:'1px 4px' }}>🗡️</span>}
              {p.hasWaterPotion&&<span style={{ ...sans, fontSize:'0.58rem', background:'#f3f4f6', border:'1px solid #e5e7eb', borderRadius:4, padding:'1px 4px' }}>💧</span>}
              {p.skipTurn&&<span style={{ ...sans, fontSize:'0.58rem', background:'#fee2e2', border:'1px solid #fca5a5', borderRadius:4, padding:'1px 4px', color:'#991b1b' }}>⏭️ skip</span>}
            </div>
            <div style={{ ...sans, fontSize:'0.58rem', color:'#9ca3af', marginTop:2 }}>Space {p.pos}{p.pos===28?' 🐉 Roll a 9!':''}</div>
          </div>
        ))}
      </div>

      {/* Dice + Roll */}
      <div style={{ display:'flex', alignItems:'center', gap:12, justifyContent:'center', marginBottom:8 }}>
        <div style={{
          width:58, height:58, borderRadius:10,
          background:rolling?'#f59e0b':'#fef3c7',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:'1.8rem', ...hd, color:'#78350f',
          border:`3px solid ${rolling?'#d97706':'#92400e'}`,
          boxShadow:rolling?'0 0 14px rgba(245,158,11,0.6)':'0 3px 6px rgba(0,0,0,0.15)',
          transition:'background 0.05s', userSelect:'none',
        }}>{dice}</div>
        <Btn onClick={doRoll} disabled={!!modal||rolling} style={{
          padding:'13px 26px', fontSize:'1rem',
          background:(modal||rolling)?'#9ca3af':'linear-gradient(135deg,#16a34a,#059669)',
          boxShadow:(modal||rolling)?'none':'0 4px 10px rgba(22,163,74,0.4)',
        }}>
          {rolling?'🎲 Rolling...':`Roll${curP?` — ${curP.name}`:''}`}
        </Btn>
      </div>

      {/* Log */}
      <div style={{ background:'#fff', border:'2px solid #e5e7eb', borderRadius:8, padding:'6px 10px', maxHeight:82, overflowY:'auto' }}>
        {log.map((msg,i)=>(
          <div key={i} style={{ ...sans, fontSize:'0.71rem', marginBottom:2, lineHeight:1.3, color:i===0?'#111827':'#9ca3af' }}>{msg}</div>
        ))}
      </div>

      {/* MODALS */}
      {modal==='card' && mdata && (
        <ModalWrap>
          <div style={{ fontSize:'3.5rem', lineHeight:1, marginBottom:8 }}>{mdata.card.emoji}</div>
          <h2 style={{ ...hd, fontSize:'1.5rem', color:'#b45309', margin:'0 0 6px' }}>{mdata.card.name}</h2>
          <p style={{ ...sans, color:'#6b7280', marginBottom:22 }}>{mdata.card.desc}</p>
          <Btn onClick={()=>applyCard(mdata.card,mdata.pi,mdata.ps)} style={{ background:'linear-gradient(135deg,#7c3aed,#6d28d9)', padding:'11px 40px', boxShadow:'0 4px 10px rgba(124,58,237,0.4)' }}>OK!</Btn>
        </ModalWrap>
      )}

      {modal==='shop' && mdata && (() => {
        const p=mdata.ps[mdata.pi];
        const buy=(item)=>{
          let nps=mdata.ps.map(pl=>({...pl}));
          if(item==='card'&&nps[mdata.pi].coins>=3){
            nps[mdata.pi].coins-=3; const c=rndCard();
            lg(`${nps[mdata.pi].name} bought a Shop Card: ${c.name}!`);
            setPlayers(nps); setMdata({card:c,pi:mdata.pi,ps:nps}); setModal('card');
          } else if(item==='potion'&&nps[mdata.pi].coins>=2&&!nps[mdata.pi].hasWaterPotion){
            nps[mdata.pi].coins-=2; nps[mdata.pi].hasWaterPotion=true;
            lg(`${nps[mdata.pi].name} bought a Water Potion!`); setPlayers(nps); setMdata({pi:mdata.pi,ps:nps});
          } else if(item==='banana'&&nps[mdata.pi].coins>=1){
            nps[mdata.pi].coins-=1; nps[mdata.pi].hearts+=1;
            lg(`${nps[mdata.pi].name} bought a Banana! +1❤️`); setPlayers(nps); setMdata({pi:mdata.pi,ps:nps});
          }
        };
        return (
          <ModalWrap>
            <h2 style={{ ...hd, fontSize:'1.5rem', color:'#9d174d', margin:'0 0 4px' }}>🛒 Shop</h2>
            <p style={{ ...sans, color:'#6b7280', marginBottom:14, fontSize:'0.9rem' }}>{p.name} has 🪙{p.coins}</p>
            {[
              {id:'card',  emoji:'🃏', name:'Shop Card',   price:3, desc:'Draw a random SE card', can:p.coins>=3},
              {id:'potion',emoji:'💧', name:'Water Potion',price:2, desc:'Shortcut at the Fork!', can:p.coins>=2&&!p.hasWaterPotion},
              {id:'banana',emoji:'🍌', name:'Banana',      price:1, desc:'+1 Heart',               can:p.coins>=1},
            ].map(item=>(
              <button key={item.id} onClick={()=>item.can&&buy(item.id)} style={{
                ...sans, fontWeight:700, display:'block', width:'100%', marginBottom:8,
                background:item.can?'#fdf2f8':'#f9fafb', border:`2px solid ${item.can?'#f9a8d4':'#e5e7eb'}`,
                opacity:item.can?1:0.45, cursor:item.can?'pointer':'not-allowed',
                textAlign:'left', padding:'10px 14px', borderRadius:10, color:'#111827',
              }}>
                <span style={{ marginRight:8, fontSize:'1.1rem' }}>{item.emoji}</span>
                <strong>{item.name}</strong>
                <span style={{ float:'right', color:'#b45309' }}>🪙{item.price}</span>
                <div style={{ ...sans, fontSize:'0.72rem', color:'#9ca3af', marginTop:2 }}>{item.desc}</div>
              </button>
            ))}
            <button onClick={endTurn} style={{ ...sans, fontWeight:700, border:'2px solid #e5e7eb', borderRadius:9, background:'#f9fafb', color:'#6b7280', cursor:'pointer', padding:'9px 28px', marginTop:4 }}>Leave Shop</button>
          </ModalWrap>
        );
      })()}

      {modal==='ocean' && mdata && (
        <ModalWrap>
          <div style={{ fontSize:'3rem', lineHeight:1, marginBottom:8 }}>🌊</div>
          <h2 style={{ ...hd, fontSize:'1.5rem', color:'#1d4ed8', margin:'0 0 6px' }}>Ocean!</h2>
          <p style={{ ...sans, color:'#6b7280', marginBottom:20 }}>{mdata.ps[mdata.pi]?.name} hit the ocean!</p>
          <div style={{ display:'flex', gap:10 }}>
            <button onClick={()=>{
              const np=Math.max(0,mdata.pos-3); let nps=mdata.ps.map(p=>({...p})); nps[mdata.pi].pos=np;
              lg(`${nps[mdata.pi].name} swims back 3 → space ${np}`);
              setModal(null); setMdata(null); setPlayers(nps); land(mdata.pi,np,nps);
            }} style={{ ...sans, fontWeight:700, flex:1, background:'#eff6ff', border:'2px solid #93c5fd', borderRadius:10, color:'#1d4ed8', cursor:'pointer', padding:'10px 6px', fontSize:'0.85rem' }}>
              🏊 Swim Back 3
            </button>
            <button onClick={()=>{
              let nps=mdata.ps.map(p=>({...p})); nps[mdata.pi].hearts-=1;
              lg(`${nps[mdata.pi].name} dives through! -1❤️`);
              nps=checkDeaths(nps); setPlayers(nps); endTurn();
            }} style={{ ...sans, fontWeight:700, flex:1, background:'#fff1f2', border:'2px solid #fca5a5', borderRadius:10, color:'#991b1b', cursor:'pointer', padding:'10px 6px', fontSize:'0.85rem' }}>
              🤿 Dive (-1❤️)
            </button>
          </div>
        </ModalWrap>
      )}

      {modal==='fork' && mdata && (() => {
        const p=mdata.ps[mdata.pi];
        return (
          <ModalWrap>
            <div style={{ fontSize:'3rem', lineHeight:1, marginBottom:8 }}>🍀</div>
            <h2 style={{ ...hd, fontSize:'1.5rem', color:'#065f46', margin:'0 0 6px' }}>Fork in the Road!</h2>
            {p.hasWaterPotion?(<>
              <p style={{ ...sans, color:'#6b7280', marginBottom:20 }}>You have a 💧 Water Potion! Skip straight to the Finno Room?</p>
              <div style={{ display:'flex', gap:10 }}>
                <button onClick={()=>{
                  let nps=mdata.ps.map(pl=>({...pl})); nps[mdata.pi].hasWaterPotion=false; nps[mdata.pi].pos=28;
                  lg(`${nps[mdata.pi].name} uses Water Potion → Finno Room!`);
                  setModal(null); setMdata(null); setPlayers(nps); land(mdata.pi,28,nps);
                }} style={{ ...sans, fontWeight:700, flex:1, background:'#f0fdf4', border:'2px solid #86efac', borderRadius:10, color:'#166534', cursor:'pointer', padding:'10px 6px', fontSize:'0.85rem' }}>💧 Use Potion!</button>
                <button onClick={endTurn} style={{ ...sans, fontWeight:700, flex:1, background:'#f9fafb', border:'2px solid #e5e7eb', borderRadius:10, color:'#6b7280', cursor:'pointer', padding:'10px 6px', fontSize:'0.85rem' }}>Continue</button>
              </div>
            </>):(<>
              <p style={{ ...sans, color:'#6b7280', marginBottom:20 }}>No Water Potion — taking the long path!</p>
              <button onClick={endTurn} style={{ ...sans, fontWeight:700, background:'#f9fafb', border:'2px solid #e5e7eb', borderRadius:10, color:'#6b7280', cursor:'pointer', padding:'10px 30px' }}>Continue</button>
            </>)}
          </ModalWrap>
        );
      })()}

      {modal==='attack' && mdata && (
        <ModalWrap>
          <div style={{ fontSize:'3rem', lineHeight:1, marginBottom:8 }}>⚔️</div>
          <h2 style={{ ...hd, fontSize:'1.5rem', color:'#dc2626', margin:'0 0 6px' }}>Attack!</h2>
          <p style={{ ...sans, color:'#6b7280', marginBottom:14 }}>{mdata.ps[mdata.pi]?.name}, choose a target:</p>
          {mdata.ps.map((tgt,ti)=>ti===mdata.pi?null:(
            <button key={ti} onClick={()=>{
              let nps=mdata.ps.map(p=>({...p}));
              if(nps[ti].hasWeapon){nps[ti].hasWeapon=false; lg(`🗡️ ${nps[ti].name}'s Sword blocked the attack!`);}
              else{nps[ti].hearts-=1; lg(`⚔️ ${nps[mdata.pi].name} attacks ${nps[ti].name}! -1❤️`); nps=checkDeaths(nps);}
              setPlayers(nps); endTurn();
            }} style={{ ...sans, fontWeight:700, display:'block', width:'100%', marginBottom:8, background:'#fff1f2', border:`2px solid ${PC[ti]}`, borderRadius:10, padding:'10px 14px', textAlign:'left', cursor:'pointer' }}>
              <span style={{ marginRight:8 }}>{PE[ti]}</span>
              <strong style={{ color:PC[ti] }}>{tgt.name}</strong>
              <span style={{ float:'right', fontSize:'0.82rem', color:'#6b7280' }}>{'❤️'.repeat(Math.min(5,Math.max(0,tgt.hearts)))}{tgt.hasWeapon?' 🗡️':''}</span>
            </button>
          ))}
        </ModalWrap>
      )}

      {modal==='finno_land' && (
        <ModalWrap>
          <div style={{ fontSize:'4rem', lineHeight:1, marginBottom:8 }}>🐉</div>
          <h2 style={{ ...hd, fontSize:'1.7rem', color:'#dc2626', margin:'0 0 6px' }}>FINNO ROOM!</h2>
          <p style={{ ...sans, color:'#6b7280', marginBottom:22 }}>
            You reached the dragon! Roll a <strong style={{ color:'#b45309', fontSize:'1.4rem' }}>9</strong> on your next turn to win!
          </p>
          <button onClick={endTurn} style={{ ...sans, fontWeight:700, background:'#292524', border:'2px solid #dc2626', borderRadius:10, color:'#fca5a5', cursor:'pointer', padding:'11px 30px', fontSize:'1rem' }}>🐉 Face the Dragon</button>
        </ModalWrap>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StarExplorers />);
