function ShopModal({ mdata, setMdata, setPlayers, setModal, endTurn, lg }) {
  const p = mdata.ps[mdata.pi];
  const buy = (item) => {
    let nps = mdata.ps.map(pl => ({ ...pl }));
    if (item === 'card' && nps[mdata.pi].coins >= 3) {
      nps[mdata.pi].coins -= 3;
      const c = rndCard();
      lg(nps[mdata.pi].name + ' bought a Shop Card: ' + c.name + '!');
      setPlayers(nps); setMdata({ card:c, pi:mdata.pi, ps:nps }); setModal('card');
    } else if (item === 'potion' && nps[mdata.pi].coins >= 2 && !nps[mdata.pi].hasWaterPotion) {
      nps[mdata.pi].coins -= 2; nps[mdata.pi].hasWaterPotion = true;
      lg(nps[mdata.pi].name + ' bought a Water Potion!');
      setPlayers(nps); setMdata({ pi:mdata.pi, ps:nps });
    } else if (item === 'banana' && nps[mdata.pi].coins >= 1) {
      nps[mdata.pi].coins -= 1; nps[mdata.pi].hearts += 1;
      lg(nps[mdata.pi].name + ' bought a Banana! +1 heart');
      setPlayers(nps); setMdata({ pi:mdata.pi, ps:nps });
    }
  };
  const items = [
    { id:'card',   emoji:'🃏', name:'Shop Card',    price:3, desc:'Draw a random SE card',  can: p.coins >= 3 },
    { id:'potion', emoji:'💧', name:'Water Potion', price:2, desc:'Shortcut at the Fork!',  can: p.coins >= 2 && !p.hasWaterPotion },
    { id:'banana', emoji:'🍌', name:'Banana',       price:1, desc:'+1 Heart',                can: p.coins >= 1 },
  ];
  return (
    <div>
      <h2 style={{ ...head, fontSize:'1.5rem', color:'#9d174d', margin:'0 0 4px' }}>🛒 Shop</h2>
      <p style={{ ...sans, color:'#6b7280', marginBottom:14, fontSize:'0.9rem' }}>{p.name} has 🪙{p.coins}</p>
      {items.map(item => (
        <button key={item.id} onClick={() => item.can && buy(item.id)} style={{
          ...sans, fontWeight:700, display:'block', width:'100%', marginBottom:8,
          background: item.can ? '#fdf2f8' : '#f9fafb',
          border: '2px solid ' + (item.can ? '#f9a8d4' : '#e5e7eb'),
          opacity: item.can ? 1 : 0.45, cursor: item.can ? 'pointer' : 'not-allowed',
          textAlign:'left', padding:'10px 14px', borderRadius:10, color:'#111827'
        }}>
          <span style={{ marginRight:8, fontSize:'1.1rem' }}>{item.emoji}</span>
          <strong>{item.name}</strong>
          <span style={{ float:'right', color:'#b45309', fontWeight:700 }}>🪙{item.price}</span>
          <div style={{ ...sans, fontSize:'0.72rem', color:'#9ca3af', marginTop:2 }}>{item.desc}</div>
        </button>
      ))}
      <button onClick={endTurn} style={{
        ...sans, fontWeight:700, border:'2px solid #e5e7eb', borderRadius:9,
        background:'#f9fafb', color:'#6b7280', cursor:'pointer', padding:'9px 28px', marginTop:4
      }}>Leave Shop</button>
    </div>
  );
}

function StarExplorers() {
  const [screen,     setScreen]     = useState('setup');
  const [nameInputs, setNameInputs] = useState(['Player 1','Player 2','Player 3','Player 4']);
  const [numP,       setNumP]       = useState(2);
  const [players,    setPlayers]    = useState([]);
  const [turn,       setTurn]       = useState(0);
  const [dice,       setDice]       = useState('?');
  const [rolling,    setRolling]    = useState(false);
  const [modal,      setModal]      = useState(null);
  const [mdata,      setMdata]      = useState(null);
  const [log,        setLog]        = useState([]);
  const [winner,     setWinner]     = useState(null);

  const lg = (msg) => setLog(l => [msg, ...l].slice(0, 30));

  const startGame = () => {
    setPlayers(nameInputs.slice(0, numP).map((n, i) => mkPl(n || 'Player ' + (i+1), i)));
    setTurn(0); setLog(['🚀 Star Explorers has begun!']);
    setDice('?'); setWinner(null); setModal(null); setMdata(null);
    setScreen('game');
  };

  const checkDeaths = (ps) => ps.map(p => {
    if (p.hearts <= 0) {
      lg(p.name + ' runs out of hearts — back to START!');
      return { ...p, hearts:3, pos:0 };
    }
    return p;
  });

  const endTurn = () => {
    setModal(null); setMdata(null);
    setTurn(t => (t + 1) % (players.length || 1));
  };

  const land = (pi, pos, ps, depth) => {
    var d = depth || 0;
    if (d > 5) { endTurn(); return; }
    const sp = SPACES[pos];
    let nps = ps.map(p => ({ ...p }));
    if (sp.type === 'coin') {
      nps[pi].coins += sp.v; lg(nps[pi].name + ' lands on +' + sp.v + ' coin!');
      setPlayers(nps); endTurn();
    } else if (sp.type === 'dmg') {
      nps[pi].hearts -= sp.v; lg(nps[pi].name + ' takes ' + sp.v + ' damage!');
      nps = checkDeaths(nps); setPlayers(nps); endTurn();
    } else if (sp.type === 'back') {
      const np = Math.max(0, pos - sp.v); nps[pi].pos = np;
      lg(nps[pi].name + ' sent back ' + sp.v + ' to space ' + np + '!');
      setPlayers(nps); land(pi, np, nps, d + 1);
    } else if (sp.type === 'warp') {
      const np = sp.to; nps[pi].pos = np;
      lg(nps[pi].name + ' warps to space ' + np + '! ✨');
      setPlayers(nps); land(pi, np, nps, d + 1);
    } else if (sp.type === 'shop') {
      setPlayers(nps); setMdata({ pi, ps:nps }); setModal('shop');
    } else if (sp.type === 'ocean') {
      setPlayers(nps); setMdata({ pi, pos, ps:nps }); setModal('ocean');
    } else if (sp.type === 'fork') {
      setPlayers(nps); setMdata({ pi, ps:nps }); setModal('fork');
    } else if (sp.type === 'finno') {
      setPlayers(nps); setMdata({ pi }); setModal('finno_land');
    } else { setPlayers(nps); endTurn(); }
  };

  const applyCard = (card, pi, ps) => {
    const eff = card.eff;
    let nps = ps.map(p => ({ ...p }));
    if (eff === 'move') {
      nps[pi].pos = Math.min(28, nps[pi].pos + card.v);
      lg(nps[pi].name + ': ' + card.name + ' → moves to space ' + nps[pi].pos + '!');
      nps = checkDeaths(nps); setPlayers(nps); land(pi, nps[pi].pos, nps, 0); return;
    }
    if      (eff === 'dmg')        { nps[pi].hearts -= card.v; lg(nps[pi].name + ': ' + card.name + ' → -' + card.v + ' heart'); }
    else if (eff === 'shark')      { nps[pi].coins += 1; nps[pi].hearts -= 1; lg(nps[pi].name + ': Shark Attack → +1 coin -1 heart'); }
    else if (eff === 'coin')       { nps[pi].coins += card.v; lg(nps[pi].name + ': ' + card.name + ' → +' + card.v + ' coin'); }
    else if (eff === 'losecoin')   { nps[pi].coins = Math.max(0, nps[pi].coins - card.v); lg(nps[pi].name + ': ' + card.name + ' → -' + card.v + ' coin'); }
    else if (eff === 'heal')       { nps[pi].hearts += card.v; lg(nps[pi].name + ': ' + card.name + ' → +' + card.v + ' heart'); }
    else if (eff === 'item_water') { nps[pi].hasWaterPotion = true; lg(nps[pi].name + ' found a Water Potion!'); }
    else if (eff === 'item_sword') { nps[pi].hasWeapon = true; lg(nps[pi].name + ' found a Sword!'); }
    else if (eff === 'skip')       { nps[pi].skipTurn = true; lg(nps[pi].name + ' must skip next turn!'); }
    else if (eff === 'storm')      { nps = nps.map(p => ({ ...p, hearts: p.hearts - 1 })); lg('Banana Storm! Everyone loses 1 heart!'); }
    else if (eff === 'attack') {
      nps = checkDeaths(nps); setPlayers(nps); setMdata({ pi, ps:nps }); setModal('attack'); return;
    } else if (eff === 'draw_again') {
      nps = checkDeaths(nps); setPlayers(nps);
      const nc = rndCard(); lg(nps[pi].name + ' draws again: ' + nc.name + '!');
      setMdata({ card:nc, pi, ps:nps }); setModal('card'); return;
    }
    nps = checkDeaths(nps); setPlayers(nps); endTurn();
  };

  const doRoll = () => {
    if (rolling || modal) return;
    const cp = players.map(p => ({ ...p })), ct = turn;
    setRolling(true);
    let ticks = 0;
    const iv = setInterval(() => {
      setDice(Math.floor(Math.random() * 10));
      if (++ticks >= 14) {
        clearInterval(iv);
        const f = Math.floor(Math.random() * 10);
        setDice(f); setRolling(false); onRoll(f, cp, ct);
      }
    }, 65);
  };

  const onRoll = (roll, ps, ti) => {
    const p = ps[ti];
    lg(p.name + ' rolls a ' + roll + '!');
    if (p.skipTurn) {
      setPlayers(ps.map((pl, i) => i === ti ? { ...pl, skipTurn:false } : pl));
      lg(p.name + ' skips their turn!'); setTurn((ti + 1) % ps.length); return;
    }
    if (p.pos === 28) {
      if (roll === 9) { lg(p.name + ' defeats the dragon and WINS!'); setWinner(p); setScreen('win'); }
      else if (roll === 0) { const c = rndCard(); setMdata({ card:c, pi:ti, ps }); setModal('card'); }
      else { lg(p.name + ' needs a 9 to win! (rolled ' + roll + ')'); setTurn((ti + 1) % ps.length); }
      return;
    }
    if (roll === 0) {
      const c = rndCard(); lg(p.name + ' rolled 0 — SE card: ' + c.name + '!');
      setMdata({ card:c, pi:ti, ps }); setModal('card'); return;
    }
    const np = Math.min(28, p.pos + roll);
    const nps = ps.map((pl, i) => i === ti ? { ...pl, pos:np } : pl);
    setPlayers(nps); lg(p.name + ' moves to space ' + np);
    land(ti, np, nps, 0);
  };

  // WIN
  if (screen === 'win') return (
    <div style={{ background:'#f5f0e8', minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ textAlign:'center', maxWidth:400, width:'100%' }}>
        <div style={{ fontSize:'4rem' }}>🏆</div>
        <h1 style={{ ...head, fontSize:'2.5rem', color:'#b45309', margin:'8px 0' }}>{winner && winner.name} WINS!</h1>
        <p style={{ ...sans, color:'#6b7280', marginBottom:20 }}>The dragon has been defeated!</p>
        <div style={{ background:'#fff', border:'3px solid #e5e7eb', borderRadius:12, padding:'14px 18px', marginBottom:20, textAlign:'left' }}>
          {players.map((p, i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0',
              borderBottom: i < players.length-1 ? '1px solid #f3f4f6':'none',
              color: winner && p.id === winner.id ? '#b45309' : '#9ca3af' }}>
              <span>{PE[i]}</span>
              <span style={{ ...sans, fontWeight:800, flex:1 }}>{p.name}</span>
              <span style={{ ...sans, fontSize:'0.85rem' }}>❤️{p.hearts} 🪙{p.coins}</span>
              {winner && p.id === winner.id && <span>👑</span>}
            </div>
          ))}
        </div>
        <button onClick={() => setScreen('setup')} style={{
          ...sans, fontWeight:800, borderRadius:10, border:'none', color:'#fff', cursor:'pointer',
          background:'linear-gradient(135deg,#16a34a,#059669)', padding:'12px 36px', fontSize:'1.05rem'
        }}>🚀 Play Again</button>
      </div>
    </div>
  );

  // SETUP
  if (screen === 'setup') return (
    <div style={{ background:'#f5f0e8', minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div style={{ width:'min(400px,96vw)', textAlign:'center' }}>
        <div style={{ fontSize:'3.5rem', lineHeight:1, marginBottom:6 }}>⭐</div>
        <h1 style={{ ...head, fontSize:'2.6rem', color:'#b45309', margin:'0 0 4px' }}>STAR EXPLORERS</h1>
        <p style={{ ...sans, color:'#6b7280', marginBottom:22 }}>Race to the Finno Room and defeat the dragon!</p>
        <div style={{ background:'#fff', border:'3px solid #e5e7eb', borderRadius:14, padding:'20px 18px' }}>
          <div style={{ marginBottom:16 }}>
            <div style={{ ...sans, fontWeight:700, marginBottom:8, textAlign:'left', fontSize:'0.78rem', color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.06em' }}>Number of Players</div>
            <div style={{ display:'flex', gap:8 }}>
              {[2,3,4].map(n => (
                <button key={n} onClick={() => setNumP(n)} style={{
                  flex:1, padding:'10px 0', borderRadius:10,
                  border: '3px solid ' + (numP===n ? '#16a34a' : '#e5e7eb'),
                  background: numP===n ? '#dcfce7' : '#f9fafb',
                  color: numP===n ? '#166534' : '#374151',
                  fontSize:'1.3rem', cursor:'pointer', fontWeight:700, ...head
                }}>{n}</button>
              ))}
            </div>
          </div>
          {[0,1,2,3].slice(0,numP).map(i => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
              <span style={{ fontSize:'1.4rem' }}>{PE[i]}</span>
              <input value={nameInputs[i]}
                onChange={e => setNameInputs(n => n.map((x,j) => j===i ? e.target.value : x))}
                placeholder={'Player ' + (i+1) + ' name'}
                style={{ ...sans, flex:1, padding:'9px 12px', borderRadius:8, border:'2px solid #e5e7eb',
                  background:'#f9fafb', color:'#111827', fontSize:'1rem', outline:'none' }} />
            </div>
          ))}
          <button onClick={startGame} style={{
            ...sans, fontWeight:800, borderRadius:10, border:'none', color:'#fff', cursor:'pointer',
            width:'100%', marginTop:10, padding:'14px 0', fontSize:'1.15rem',
            background:'linear-gradient(135deg,#16a34a,#059669)',
            boxShadow:'0 4px 12px rgba(22,163,74,0.35)'
          }}>🚀 Launch Game!</button>
        </div>
        <p style={{ ...sans, marginTop:14, fontSize:'0.72rem', color:'#9ca3af', lineHeight:1.7 }}>
          Roll 1–9 to move · Roll 0 = draw SE card · Reach 🐉 then roll a 9 to win · Shop at space 9
        </p>
      </div>
    </div>
  );

  // GAME
  const curP = players[turn];
  const byPos = {};
  players.forEach((p, i) => { if (!byPos[p.pos]) byPos[p.pos] = []; byPos[p.pos].push(i); });

  return (
    <div style={{ background:'#f5f0e8', minHeight:'100vh', padding:'8px 8px 16px', maxWidth:520, margin:'0 auto' }}>

      <div style={{ textAlign:'center', padding:'6px 0 4px' }}>
        <span style={{ ...head, fontSize:'1.3rem', color:'#b45309' }}>⭐ STAR EXPLORERS ⭐</span>
      </div>

      {/* BOARD */}
      <div style={{ background:'#2d6a4f', borderRadius:10, padding:5, border:'4px solid #1b4332',
        boxShadow:'0 4px 16px rgba(0,0,0,0.3)', margin:'0 0 8px' }}>
        <div style={{ ...hand, fontSize:'0.6rem', color:'#fca5a5', textAlign:'center', marginBottom:3, letterSpacing:'0.08em' }}>
          ☁️ THE FINNO ROOM — LAVA ☁️
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(8,1fr)', gap:2 }}>
          {BOARD_ROWS.map((row, ri) => row.map((sid, ci) => {
            if (sid === -1) return (
              <div key={'e'+ri+ci} style={{ aspectRatio:'1', background:'rgba(0,0,0,0.2)', borderRadius:3,
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.7rem' }}>🌋</div>
            );
            const sp = SPACES[sid];
            const here = byPos[sid] || [];
            const hot = here.length > 0;
            const fin = sid === 28;
            return (
              <div key={'s'+sid} style={{
                aspectRatio:'1', background:sp.bg, borderRadius:3, overflow:'hidden',
                border: (hot ? 2 : 1.5) + 'px solid ' + (hot ? '#f59e0b' : sp.border),
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                position:'relative', padding:1,
                boxShadow: hot ? '0 0 6px rgba(245,158,11,0.8)' : fin ? '0 0 8px rgba(220,38,38,0.6)' : 'none',
              }}>
                <div style={{ position:'absolute', top:1, left:2, fontSize:'0.3rem', lineHeight:1,
                  color: sp.type==='ocean'||sp.type==='finno' ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.25)',
                  ...hand }}>{sid}</div>
                <div style={{ ...hand, fontSize: fin ? '0.4rem' : '0.52rem', lineHeight:1.15,
                  color:sp.fg, textAlign:'center', fontWeight: fin ? 700 : 400 }}>{sp.label}</div>
                {here.length > 0 && (
                  <div style={{ display:'flex', gap:1, justifyContent:'center', marginTop:1, flexWrap:'wrap' }}>
                    {here.map(pi => (
                      <div key={pi} style={{ width:7, height:7, borderRadius:'50%',
                        background:PC[pi], border:'1.5px solid white', boxShadow:'0 1px 2px rgba(0,0,0,0.4)' }} />
                    ))}
                  </div>
                )}
              </div>
            );
          }))}
        </div>
        <div style={{ ...hand, fontSize:'0.6rem', color:'#bfdbfe', textAlign:'center', marginTop:3 }}>
          🌊 OCEAN — swim back 3 spaces OR dive through (-1 heart) 🌊
        </div>
      </div>

      {/* PLAYER CARDS */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6, marginBottom:8 }}>
        {players.map((p, i) => (
          <div key={i} style={{
            background:'#fff', borderRadius:10, padding:'8px 10px',
            border: '2.5px solid ' + (i===turn ? PC[i] : '#e5e7eb'),
            boxShadow: i===turn ? '0 0 10px ' + PC[i] + '55' : '0 1px 4px rgba(0,0,0,0.08)',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:3 }}>
              <span>{PE[i]}</span>
              <span style={{ ...sans, fontWeight:800, fontSize:'0.82rem', color:PC[i],
                flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.name}</span>
              {i===turn && <span style={{ ...sans, fontSize:'0.52rem', background:PC[i],
                borderRadius:6, padding:'1px 5px', color:'#fff', flexShrink:0 }}>NOW</span>}
            </div>
            <div style={{ ...sans, fontSize:'0.79rem', display:'flex', gap:8, flexWrap:'wrap' }}>
              <span>{'❤️'.repeat(Math.min(5, Math.max(0, p.hearts)))}{p.hearts>5?'+':''}{ p.hearts<=0?'💀':''}</span>
              <span>🪙{p.coins}</span>
            </div>
            <div style={{ display:'flex', gap:3, marginTop:3, flexWrap:'wrap' }}>
              {p.hasWeapon && <span style={{ ...sans, fontSize:'0.58rem', background:'#f3f4f6', border:'1px solid #e5e7eb', borderRadius:4, padding:'1px 4px' }}>🗡️</span>}
              {p.hasWaterPotion && <span style={{ ...sans, fontSize:'0.58rem', background:'#f3f4f6', border:'1px solid #e5e7eb', borderRadius:4, padding:'1px 4px' }}>💧</span>}
              {p.skipTurn && <span style={{ ...sans, fontSize:'0.58rem', background:'#fee2e2', border:'1px solid #fca5a5', borderRadius:4, padding:'1px 4px', color:'#991b1b' }}>⏭️skip</span>}
            </div>
            <div style={{ ...sans, fontSize:'0.58rem', color:'#9ca3af', marginTop:2 }}>
              Space {p.pos}{p.pos===28?' 🐉 Roll a 9!':''}
            </div>
          </div>
        ))}
      </div>

      {/* DICE + ROLL */}
      <div style={{ display:'flex', alignItems:'center', gap:12, justifyContent:'center', marginBottom:8 }}>
        <div style={{
          width:58, height:58, borderRadius:10, userSelect:'none',
          background: rolling ? '#f59e0b' : '#fef3c7',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:'1.8rem', ...head, color:'#78350f',
          border: '3px solid ' + (rolling ? '#d97706' : '#92400e'),
          boxShadow: rolling ? '0 0 14px rgba(245,158,11,0.6)' : '0 3px 6px rgba(0,0,0,0.2)',
        }}>{dice}</div>
        <button onClick={doRoll} disabled={!!modal || rolling} style={{
          ...sans, fontWeight:800, borderRadius:10, border:'none', color:'#fff',
          padding:'13px 26px', fontSize:'1rem',
          background: (modal || rolling) ? '#9ca3af' : 'linear-gradient(135deg,#16a34a,#059669)',
          cursor: (modal || rolling) ? 'not-allowed' : 'pointer',
          boxShadow: (modal || rolling) ? 'none' : '0 4px 10px rgba(22,163,74,0.4)',
          opacity: (modal || rolling) ? 0.7 : 1,
        }}>
          {rolling ? '🎲 Rolling...' : ('Roll' + (curP ? ' — ' + curP.name : ''))}
        </button>
      </div>

      {/* LOG */}
      <div style={{ background:'#fff', border:'2px solid #e5e7eb', borderRadius:8,
        padding:'6px 10px', maxHeight:84, overflowY:'auto' }}>
        {log.length === 0 && <div style={{ ...sans, fontSize:'0.7rem', color:'#d1d5db' }}>Game log appears here…</div>}
        {log.map((msg, i) => (
          <div key={i} style={{ ...sans, fontSize:'0.71rem', marginBottom:2, lineHeight:1.3,
            color: i===0 ? '#111827' : '#9ca3af' }}>{msg}</div>
        ))}
      </div>

      {/* MODAL */}
      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', display:'flex',
          alignItems:'center', justifyContent:'center', zIndex:50, padding:16 }}>
          <div style={{ background:'#fff', border:'3px solid #e5e7eb', borderRadius:18,
            padding:'24px 22px', width:'min(380px,93vw)', textAlign:'center',
            maxHeight:'85vh', overflowY:'auto', boxShadow:'0 20px 48px rgba(0,0,0,0.25)' }}>

            {modal === 'card' && mdata && (
              <div>
                <div style={{ fontSize:'3.5rem', lineHeight:1, marginBottom:8 }}>{mdata.card.emoji}</div>
                <h2 style={{ ...head, fontSize:'1.5rem', color:'#b45309', margin:'0 0 6px' }}>{mdata.card.name}</h2>
                <p style={{ ...sans, color:'#6b7280', marginBottom:22, fontSize:'1rem' }}>{mdata.card.desc}</p>
                <button onClick={() => applyCard(mdata.card, mdata.pi, mdata.ps)}
                  style={{ ...sans, fontWeight:800, borderRadius:10, border:'none', color:'#fff', cursor:'pointer',
                    background:'linear-gradient(135deg,#7c3aed,#6d28d9)', padding:'11px 40px',
                    boxShadow:'0 4px 10px rgba(124,58,237,0.4)' }}>OK!</button>
              </div>
            )}

            {modal === 'shop' && mdata && (
              <ShopModal mdata={mdata} setMdata={setMdata} setPlayers={setPlayers}
                setModal={setModal} endTurn={endTurn} lg={lg} />
            )}

            {modal === 'ocean' && mdata && (
              <div>
                <div style={{ fontSize:'3rem', lineHeight:1, marginBottom:8 }}>🌊</div>
                <h2 style={{ ...head, fontSize:'1.5rem', color:'#1d4ed8', margin:'0 0 6px' }}>Ocean!</h2>
                <p style={{ ...sans, color:'#6b7280', marginBottom:20, fontSize:'0.95rem' }}>
                  {mdata.ps[mdata.pi] && mdata.ps[mdata.pi].name} hit the ocean! Choose:
                </p>
                <div style={{ display:'flex', gap:10 }}>
                  <button onClick={() => {
                    const np = Math.max(0, mdata.pos - 3);
                    let nps = mdata.ps.map(p => ({ ...p })); nps[mdata.pi].pos = np;
                    lg(nps[mdata.pi].name + ' swims back 3 → space ' + np);
                    setModal(null); setMdata(null); setPlayers(nps); land(mdata.pi, np, nps, 0);
                  }} style={{ ...sans, fontWeight:700, flex:1, background:'#eff6ff', border:'2px solid #93c5fd',
                    borderRadius:10, color:'#1d4ed8', cursor:'pointer', padding:'10px 6px', fontSize:'0.85rem' }}>
                    🏊 Swim Back 3
                  </button>
                  <button onClick={() => {
                    let nps = mdata.ps.map(p => ({ ...p })); nps[mdata.pi].hearts -= 1;
                    lg(nps[mdata.pi].name + ' dives through! -1 heart');
                    nps = checkDeaths(nps); setPlayers(nps); endTurn();
                  }} style={{ ...sans, fontWeight:700, flex:1, background:'#fff1f2', border:'2px solid #fca5a5',
                    borderRadius:10, color:'#991b1b', cursor:'pointer', padding:'10px 6px', fontSize:'0.85rem' }}>
                    🤿 Dive (-1❤️)
                  </button>
                </div>
              </div>
            )}

            {modal === 'fork' && mdata && (
              <ForkModal mdata={mdata} setMdata={setMdata} setPlayers={setPlayers}
                setModal={setModal} endTurn={endTurn} land={land} lg={lg} />
            )}

            {modal === 'attack' && mdata && (
              <div>
                <div style={{ fontSize:'3rem', lineHeight:1, marginBottom:8 }}>⚔️</div>
                <h2 style={{ ...head, fontSize:'1.5rem', color:'#dc2626', margin:'0 0 6px' }}>Attack!</h2>
                <p style={{ ...sans, color:'#6b7280', marginBottom:14, fontSize:'0.9rem' }}>
                  {mdata.ps[mdata.pi] && mdata.ps[mdata.pi].name}, choose a target:
                </p>
                {mdata.ps.map((tgt, ti) => {
                  if (ti === mdata.pi) return null;
                  return (
                    <button key={ti} onClick={() => {
                      let nps = mdata.ps.map(p => ({ ...p }));
                      if (nps[ti].hasWeapon) { nps[ti].hasWeapon = false; lg(nps[ti].name + "'s Sword blocked the attack!"); }
                      else { nps[ti].hearts -= 1; lg(nps[mdata.pi].name + ' attacks ' + nps[ti].name + '! -1 heart'); nps = checkDeaths(nps); }
                      setPlayers(nps); endTurn();
                    }} style={{ ...sans, fontWeight:700, display:'block', width:'100%', marginBottom:8,
                      background:'#fff1f2', border:'2px solid ' + PC[ti], borderRadius:10,
                      padding:'10px 14px', textAlign:'left', cursor:'pointer' }}>
                      <span style={{ marginRight:8 }}>{PE[ti]}</span>
                      <strong style={{ color:PC[ti] }}>{tgt.name}</strong>
                      <span style={{ float:'right', fontSize:'0.82rem', color:'#6b7280' }}>
                        {'❤️'.repeat(Math.min(5, Math.max(0, tgt.hearts)))}
                        {tgt.hasWeapon ? ' 🗡️' : ''}
                      </span>
                    </button>
                  );
                })}
              </div>
            )}

            {modal === 'finno_land' && (
              <div>
                <div style={{ fontSize:'4rem', lineHeight:1, marginBottom:8 }}>🐉</div>
                <h2 style={{ ...head, fontSize:'1.7rem', color:'#dc2626', margin:'0 0 6px' }}>FINNO ROOM!</h2>
                <p style={{ ...sans, color:'#6b7280', marginBottom:22, fontSize:'1rem' }}>
                  You reached the dragon! Roll a <strong style={{ color:'#b45309', fontSize:'1.4rem' }}>9</strong> on your next turn to win!
                </p>
                <button onClick={endTurn} style={{ ...sans, fontWeight:700, background:'#292524',
                  border:'2px solid #dc2626', borderRadius:10, color:'#fca5a5',
                  cursor:'pointer', padding:'11px 30px', fontSize:'1rem' }}>
                  🐉 Face the Dragon
                </button>
              </div>
            )}

          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StarExplorers />);
