<script>
/* ── PWA: generate icons via canvas & inject manifest ── */
(function(){
  function makeIcon(size){
    const c=document.createElement('canvas');
    c.width=c.height=size;
    const ctx=c.getContext('2d');
    // bg
    ctx.fillStyle='#2d6a4f';
    const r=size*0.18;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();ctx.fill();
    // star emoji
    ctx.font=`${size*0.6}px serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('⭐',size/2,size/2+size*0.04);
    return c.toDataURL('image/png');
  }

  const icons=[192,512].map(s=>({src:makeIcon(s),sizes:s+'x'+s,type:'image/png',purpose:'any maskable'}));

  const manifest={
    name:'Star Explorers',
    short_name:'StarExp',
    description:'Family board game for 2-4 players',
    start_url:'./',
    display:'standalone',
    orientation:'portrait',
    background_color:'#f5f0e8',
    theme_color:'#2d6a4f',
    icons
  };

  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('link');
  link.rel='manifest'; link.href=url;
  document.head.appendChild(link);

  // Apple touch icon
  const appleLink=document.createElement('link');
  appleLink.rel='apple-touch-icon';
  appleLink.href=makeIcon(180);
  document.head.appendChild(appleLink);
})();

/* ── PWA: service worker via blob ── */
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='star-explorers-v1';
    const OFFLINE=['/'];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(OFFLINE)));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      if(e.request.mode==='navigate'){
        e.respondWith(fetch(e.request).catch(()=>caches.match('/')));
        return;
      }
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>

<script>
const { useState } = React;
const html = htm.bind(React.createElement);

/* ── DATA ── */
const SPACES = [
  {id:0,  type:'start', label:'START',  bg:'#bbf7d0', fg:'#166534', bd:'#16a34a'},
  {id:1,  type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:2,  type:'back',  v:2,  label:'←2',   bg:'#fee2e2', fg:'#991b1b', bd:'#ef4444'},
  {id:3,  type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:4,  type:'warp',  to:14,label:'Warp!', bg:'#ede9fe', fg:'#6d28d9', bd:'#8b5cf6'},
  {id:5,  type:'dmg',   v:1,  label:'-1♥',  bg:'#fecaca', fg:'#991b1b', bd:'#ef4444'},
  {id:6,  type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:7,  type:'path',  label:'',           bg:'#ffffff', fg:'#9ca3af', bd:'#e5e7eb'},
  {id:8,  type:'path',  label:'',           bg:'#ffffff', fg:'#9ca3af', bd:'#e5e7eb'},
  {id:9,  type:'shop',  label:'SHOP',       bg:'#fce7f3', fg:'#9d174d', bd:'#ec4899'},
  {id:10, type:'back',  v:3,  label:'←3',   bg:'#fee2e2', fg:'#991b1b', bd:'#ef4444'},
  {id:11, type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:12, type:'dmg',   v:1,  label:'-1♥',  bg:'#fecaca', fg:'#991b1b', bd:'#ef4444'},
  {id:13, type:'path',  label:'',           bg:'#ffffff', fg:'#9ca3af', bd:'#e5e7eb'},
  {id:14, type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:15, type:'path',  label:'',           bg:'#ffffff', fg:'#9ca3af', bd:'#e5e7eb'},
  {id:16, type:'ocean', label:'Ocean',      bg:'#1d4ed8', fg:'#ffffff', bd:'#1e40af'},
  {id:17, type:'ocean', label:'Ocean',      bg:'#1d4ed8', fg:'#ffffff', bd:'#1e40af'},
  {id:18, type:'ocean', label:'Ocean',      bg:'#2563eb', fg:'#ffffff', bd:'#1e40af'},
  {id:19, type:'ocean', label:'Ocean',      bg:'#1d4ed8', fg:'#ffffff', bd:'#1e40af'},
  {id:20, type:'path',  label:'Shore',      bg:'#fef3c7', fg:'#92400e', bd:'#d97706'},
  {id:21, type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:22, type:'dmg',   v:1,  label:'-1♥',  bg:'#fecaca', fg:'#991b1b', bd:'#ef4444'},
  {id:23, type:'path',  label:'',           bg:'#ffffff', fg:'#9ca3af', bd:'#e5e7eb'},
  {id:24, type:'path',  label:'',           bg:'#ffffff', fg:'#9ca3af', bd:'#e5e7eb'},
  {id:25, type:'fork',  label:'Fork',       bg:'#d1fae5', fg:'#065f46', bd:'#10b981'},
  {id:26, type:'back',  v:2,  label:'←2',   bg:'#fee2e2', fg:'#991b1b', bd:'#ef4444'},
  {id:27, type:'coin',  v:1,  label:'+1🪙', bg:'#fef9c3', fg:'#854d0e', bd:'#ca8a04'},
  {id:28, type:'finno', label:'FINNO',      bg:'#292524', fg:'#fca5a5', bd:'#dc2626'},
];

const CARDS = [
  {id:'dragon',name:'Dragon Tamer',    emoji:'🐲',desc:'Move forward 3 spaces!',            eff:'move',       v:3},
  {id:'trap',  name:'Trap!',           emoji:'🪤',desc:'Lose 1 heart.',                      eff:'dmg',        v:1},
  {id:'shark', name:'Shark Attack',    emoji:'🦈',desc:'+1 coin, but lose 1 heart!',         eff:'shark'},
  {id:'sword', name:'Sword of Destroy',emoji:'⚔️',desc:'Attack another player for -1 heart!',eff:'attack'},
  {id:'lake',  name:'Fell in Lake',    emoji:'💦',desc:'Lose 2 hearts.',                     eff:'dmg',        v:2},
  {id:'iwp',   name:'Water Potion',    emoji:'💧',desc:'You found a Water Potion!',          eff:'item_water'},
  {id:'isw',   name:'Sword',           emoji:'🗡',desc:'Found a Sword! Blocks one attack.',  eff:'item_sword'},
  {id:'thin',  name:"Lookin' Thin",    emoji:'😬',desc:'Lose 1 coin.',                       eff:'losecoin',   v:1},
  {id:'storm', name:'Banana Storm',    emoji:'🍌',desc:'All players lose 1 heart!',          eff:'storm'},
  {id:'skip',  name:'Skip Turn',       emoji:'⏭',desc:'Skip your next turn.',               eff:'skip'},
  {id:'bheal', name:'Banana Heal',     emoji:'🍌',desc:'Gain 2 hearts!',                    eff:'heal',       v:2},
  {id:'molly', name:"Molly's Message", emoji:'📬',desc:'Draw another SE card!',             eff:'draw_again'},
  {id:'spark', name:'Spark Attack',    emoji:'⚡',desc:'Lose 1 heart.',                     eff:'dmg',        v:1},
  {id:'treas', name:'Treasure',        emoji:'💎',desc:'Gain 2 coins!',                     eff:'coin',       v:2},
  {id:'horse', name:'Horse',           emoji:'🐴',desc:'Move forward 2 spaces!',            eff:'move',       v:2},
];

const ROWS = [
  [-1,-1,-1,28,27,26,25,24],
  [16,17,18,19,20,21,22,23],
  [15,14,13,12,11,10, 9, 8],
  [ 0, 1, 2, 3, 4, 5, 6, 7],
];

const PC = ['#dc2626','#2563eb','#16a34a','#d97706'];
const PE = ['🚀','🛸','⭐','🌙'];
const F  = {head:"'Fredoka One',cursive", sans:"'Nunito',sans-serif", hand:"'Patrick Hand',cursive"};

const rnd = () => CARDS[Math.floor(Math.random()*CARDS.length)];
const mkP = (name,i) => ({id:i,name,pos:0,coins:0,hearts:3,hasWeapon:false,hasPotion:false,skipTurn:false});

/* ── APP ── */
function App(){
  const [screen,  setScreen]  = useState('setup');
  const [names,   setNames]   = useState(['Player 1','Player 2','Player 3','Player 4']);
  const [numP,    setNumP]    = useState(2);
  const [players, setPlayers] = useState([]);
  const [turn,    setTurn]    = useState(0);
  const [dice,    setDice]    = useState('?');
  const [rolling, setRolling] = useState(false);
  const [modal,   setModal]   = useState(null);
  const [mdata,   setMdata]   = useState(null);
  const [log,     setLog]     = useState([]);
  const [winner,  setWinner]  = useState(null);

  const lg = (m) => setLog(l => [m,...l].slice(0,30));

  const startGame = () => {
    setPlayers(names.slice(0,numP).map((n,i)=>mkP(n||'Player '+(i+1),i)));
    setTurn(0); setLog(['🚀 Star Explorers has begun!']);
    setDice('?'); setWinner(null); setModal(null); setMdata(null);
    setScreen('game');
  };

  const deaths = (ps) => ps.map(p => {
    if(p.hearts<=0){ lg(p.name+' runs out of hearts — back to START!'); return {...p,hearts:3,pos:0}; }
    return p;
  });

  const endTurn = () => { setModal(null); setMdata(null); setTurn(t=>(t+1)%(players.length||1)); };

  const land = (pi,pos,ps,d) => {
    d=d||0; if(d>5){endTurn();return;}
    const sp=SPACES[pos];
    let nps=ps.map(p=>({...p}));
    if(sp.type==='coin'){
      nps[pi].coins+=sp.v; lg(nps[pi].name+' lands on +'+sp.v+' coin!');
      setPlayers(nps); endTurn();
    } else if(sp.type==='dmg'){
      nps[pi].hearts-=sp.v; lg(nps[pi].name+' takes damage!');
      nps=deaths(nps); setPlayers(nps); endTurn();
    } else if(sp.type==='back'){
      const np=Math.max(0,pos-sp.v); nps[pi].pos=np;
      lg(nps[pi].name+' sent back '+sp.v+' to space '+np+'!');
      setPlayers(nps); land(pi,np,nps,d+1);
    } else if(sp.type==='warp'){
      const np=sp.to; nps[pi].pos=np;
      lg(nps[pi].name+' warps to space '+np+'! ✨');
      setPlayers(nps); land(pi,np,nps,d+1);
    } else if(sp.type==='shop'){
      setPlayers(nps); setMdata({pi,ps:nps}); setModal('shop');
    } else if(sp.type==='ocean'){
      setPlayers(nps); setMdata({pi,pos,ps:nps}); setModal('ocean');
    } else if(sp.type==='fork'){
      setPlayers(nps); setMdata({pi,ps:nps}); setModal('fork');
    } else if(sp.type==='finno'){
      setPlayers(nps); setMdata({pi}); setModal('finno');
    } else { setPlayers(nps); endTurn(); }
  };

  const applyCard = (card,pi,ps) => {
    const eff=card.eff;
    let nps=ps.map(p=>({...p}));
    if(eff==='move'){
      nps[pi].pos=Math.min(28,nps[pi].pos+card.v);
      lg(nps[pi].name+': '+card.name+' → space '+nps[pi].pos+'!');
      nps=deaths(nps); setPlayers(nps); land(pi,nps[pi].pos,nps,0); return;
    }
    if     (eff==='dmg')        { nps[pi].hearts-=card.v; lg(nps[pi].name+': '+card.name+' → -'+card.v+' heart'); }
    else if(eff==='shark')      { nps[pi].coins+=1; nps[pi].hearts-=1; lg(nps[pi].name+': Shark Attack!'); }
    else if(eff==='coin')       { nps[pi].coins+=card.v; lg(nps[pi].name+': +'+card.v+' coin!'); }
    else if(eff==='losecoin')   { nps[pi].coins=Math.max(0,nps[pi].coins-card.v); lg(nps[pi].name+': -'+card.v+' coin'); }
    else if(eff==='heal')       { nps[pi].hearts+=card.v; lg(nps[pi].name+': +'+card.v+' hearts!'); }
    else if(eff==='item_water') { nps[pi].hasPotion=true; lg(nps[pi].name+' found a Water Potion!'); }
    else if(eff==='item_sword') { nps[pi].hasWeapon=true; lg(nps[pi].name+' found a Sword!'); }
    else if(eff==='skip')       { nps[pi].skipTurn=true; lg(nps[pi].name+' must skip next turn!'); }
    else if(eff==='storm')      { nps=nps.map(p=>({...p,hearts:p.hearts-1})); lg('🍌 Banana Storm! Everyone -1 heart!'); }
    else if(eff==='attack')     { nps=deaths(nps); setPlayers(nps); setMdata({pi,ps:nps}); setModal('attack'); return; }
    else if(eff==='draw_again') {
      nps=deaths(nps); setPlayers(nps);
      const nc=rnd(); lg(nps[pi].name+' draws again: '+nc.name+'!');
      setMdata({card:nc,pi,ps:nps}); setModal('card'); return;
    }
    nps=deaths(nps); setPlayers(nps); endTurn();
  };

  const doRoll = () => {
    if(rolling||modal) return;
    const cp=players.map(p=>({...p})), ct=turn;
    setRolling(true);
    let ticks=0;
    const iv=setInterval(()=>{
      setDice(Math.floor(Math.random()*10));
      if(++ticks>=14){
        clearInterval(iv);
        const f=Math.floor(Math.random()*10);
        setDice(f); setRolling(false); onRoll(f,cp,ct);
      }
    },65);
  };

  const onRoll = (roll,ps,ti) => {
    const p=ps[ti];
    lg(p.name+' rolls a '+roll+'!');
    if(p.skipTurn){
      setPlayers(ps.map((pl,i)=>i===ti?{...pl,skipTurn:false}:pl));
      lg(p.name+' skips!'); setTurn((ti+1)%ps.length); return;
    }
    if(p.pos===28){
      if(roll===9)      { lg(p.name+' WINS!'); setWinner(p); setScreen('win'); }
      else if(roll===0) { const c=rnd(); setMdata({card:c,pi:ti,ps}); setModal('card'); }
      else              { lg(p.name+' needs a 9! (rolled '+roll+')'); setTurn((ti+1)%ps.length); }
      return;
    }
    if(roll===0){
      const c=rnd(); lg(p.name+' rolled 0 — draws '+c.name+'!');
      setMdata({card:c,pi:ti,ps}); setModal('card'); return;
    }
    const np=Math.min(28,p.pos+roll);
    const nps=ps.map((pl,i)=>i===ti?{...pl,pos:np}:pl);
    setPlayers(nps); lg(p.name+' moves to space '+np);
    land(ti,np,nps,0);
  };

  /* ── WIN ── */
  if(screen==='win') return html`
    <div style=${{background:'#f5f0e8',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
      <div style=${{textAlign:'center',maxWidth:'400px',width:'100%'}}>
        <div style=${{fontSize:'4rem'}}>🏆</div>
        <h1 style=${{fontFamily:F.head,fontSize:'2.5rem',color:'#b45309',margin:'8px 0'}}>${winner&&winner.name} WINS!</h1>
        <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'20px'}}>The dragon has been defeated!</p>
        <div style=${{background:'#fff',border:'3px solid #e5e7eb',borderRadius:'12px',padding:'14px 18px',marginBottom:'20px',textAlign:'left'}}>
          ${players.map((p,i)=>html`
            <div key=${i} style=${{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',
              borderBottom:i<players.length-1?'1px solid #f3f4f6':'none',
              color:winner&&p.id===winner.id?'#b45309':'#9ca3af'}}>
              <span>${PE[i]}</span>
              <span style=${{fontFamily:F.sans,fontWeight:800,flex:1}}>${p.name}</span>
              <span style=${{fontFamily:F.sans,fontSize:'0.85rem'}}>❤️${p.hearts} 🪙${p.coins}</span>
              ${winner&&p.id===winner.id?html`<span>👑</span>`:null}
            </div>`)}
        </div>
        <button onClick=${()=>setScreen('setup')}
          style=${{fontFamily:F.sans,fontWeight:800,borderRadius:'10px',border:'none',color:'#fff',cursor:'pointer',
            background:'linear-gradient(135deg,#16a34a,#059669)',padding:'12px 36px',fontSize:'1.05rem'}}>
          🚀 Play Again
        </button>
      </div>
    </div>`;

  /* ── SETUP ── */
  if(screen==='setup') return html`
    <div style=${{background:'#f5f0e8',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div style=${{width:'min(400px,96vw)',textAlign:'center'}}>
        <div style=${{fontSize:'3.5rem',lineHeight:1,marginBottom:'6px'}}>⭐</div>
        <h1 style=${{fontFamily:F.head,fontSize:'2.6rem',color:'#b45309',margin:'0 0 4px'}}>STAR EXPLORERS</h1>
        <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'22px'}}>Race to the Finno Room and defeat the dragon!</p>
        <div style=${{background:'#fff',border:'3px solid #e5e7eb',borderRadius:'14px',padding:'20px 18px'}}>
          <div style=${{marginBottom:'16px'}}>
            <div style=${{fontFamily:F.sans,fontWeight:700,marginBottom:'8px',textAlign:'left',
              fontSize:'0.78rem',color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.06em'}}>Players</div>
            <div style=${{display:'flex',gap:'8px'}}>
              ${[2,3,4].map(n=>html`
                <button key=${n} onClick=${()=>setNumP(n)}
                  style=${{flex:1,padding:'10px 0',borderRadius:'10px',
                    border:'3px solid '+(numP===n?'#16a34a':'#e5e7eb'),
                    background:numP===n?'#dcfce7':'#f9fafb',
                    color:numP===n?'#166534':'#374151',
                    fontSize:'1.3rem',cursor:'pointer',fontWeight:700,fontFamily:F.head}}>
                  ${n}
                </button>`)}
            </div>
          </div>
          ${[0,1,2,3].slice(0,numP).map(i=>html`
            <div key=${i} style=${{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
              <span style=${{fontSize:'1.4rem'}}>${PE[i]}</span>
              <input value=${names[i]}
                onInput=${e=>setNames(n=>n.map((x,j)=>j===i?e.target.value:x))}
                placeholder=${'Player '+(i+1)+' name'}
                style=${{fontFamily:F.sans,flex:1,padding:'9px 12px',borderRadius:'8px',
                  border:'2px solid #e5e7eb',background:'#f9fafb',color:'#111827',
                  fontSize:'1rem',outline:'none'}}/>
            </div>`)}
          <button onClick=${startGame}
            style=${{fontFamily:F.sans,fontWeight:800,borderRadius:'10px',border:'none',color:'#fff',
              cursor:'pointer',width:'100%',marginTop:'10px',padding:'14px 0',fontSize:'1.15rem',
              background:'linear-gradient(135deg,#16a34a,#059669)',
              boxShadow:'0 4px 12px rgba(22,163,74,0.35)'}}>
            🚀 Launch Game!
          </button>
        </div>
        <p style=${{fontFamily:F.sans,marginTop:'14px',fontSize:'0.72rem',color:'#9ca3af',lineHeight:1.7}}>
          Roll 1–9 to move · Roll 0 = draw SE card · Reach 🐉 then roll a 9 to win · Shop at space 9
        </p>
      </div>
    </div>`;

  /* ── GAME ── */
  const curP=players[turn];
  const byPos={};
  players.forEach((p,i)=>{ if(!byPos[p.pos]) byPos[p.pos]=[]; byPos[p.pos].push(i); });

  return html`
    <div class="safe-wrap" style=${{background:'#f5f0e8',minHeight:'100vh',padding:'8px 8px 16px',maxWidth:'520px',margin:'0 auto'}}>

      <div style=${{textAlign:'center',padding:'6px 0 4px'}}>
        <span style=${{fontFamily:F.head,fontSize:'1.3rem',color:'#b45309'}}>⭐ STAR EXPLORERS ⭐</span>
      </div>

      <!-- BOARD -->
      <div style=${{background:'#2d6a4f',borderRadius:'10px',padding:'5px',border:'4px solid #1b4332',
        boxShadow:'0 4px 16px rgba(0,0,0,0.3)',margin:'0 0 8px'}}>
        <div style=${{fontFamily:F.hand,fontSize:'0.6rem',color:'#fca5a5',textAlign:'center',
          marginBottom:'3px',letterSpacing:'0.08em'}}>
          ☁️ THE FINNO ROOM — LAVA ☁️
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:'2px'}}>
          ${ROWS.map((row,ri)=>row.map((sid,ci)=>{
            if(sid===-1) return html`
              <div key=${'e'+ri+ci} style=${{aspectRatio:'1',background:'rgba(0,0,0,0.2)',borderRadius:'3px',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.7rem'}}>🌋</div>`;
            const sp=SPACES[sid], here=byPos[sid]||[], hot=here.length>0, fin=sid===28;
            return html`
              <div key=${'s'+sid} style=${{aspectRatio:'1',background:sp.bg,borderRadius:'3px',overflow:'hidden',
                border:(hot?'2px':'1.5px')+' solid '+(hot?'#f59e0b':sp.bd),
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                position:'relative',padding:'1px',
                boxShadow:hot?'0 0 6px rgba(245,158,11,0.8)':fin?'0 0 8px rgba(220,38,38,0.6)':'none'}}>
                <div style=${{position:'absolute',top:'1px',left:'2px',fontSize:'0.3rem',lineHeight:1,
                  fontFamily:F.hand,
                  color:(sp.type==='ocean'||sp.type==='finno')?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.25)'}}>${sid}</div>
                <div style=${{fontFamily:F.hand,fontSize:fin?'0.4rem':'0.52rem',lineHeight:1.15,
                  color:sp.fg,textAlign:'center',fontWeight:fin?700:400}}>${sp.label}</div>
                ${here.length>0?html`
                  <div style=${{display:'flex',gap:'1px',justifyContent:'center',marginTop:'1px',flexWrap:'wrap'}}>
                    ${here.map(pi=>html`
                      <div key=${pi} style=${{width:'7px',height:'7px',borderRadius:'50%',
                        background:PC[pi],border:'1.5px solid white',
                        boxShadow:'0 1px 2px rgba(0,0,0,0.4)'}}></div>`)}
                  </div>`:null}
              </div>`;
          }))}
        </div>
        <div style=${{fontFamily:F.hand,fontSize:'0.6rem',color:'#bfdbfe',textAlign:'center',marginTop:'3px'}}>
          🌊 OCEAN — swim back 3 OR dive through (-1 heart) 🌊
        </div>
      </div>

      <!-- PLAYER CARDS -->
      <div style=${{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'6px',marginBottom:'8px'}}>
        ${players.map((p,i)=>html`
          <div key=${i} style=${{background:'#fff',borderRadius:'10px',padding:'8px 10px',
            border:'2.5px solid '+(i===turn?PC[i]:'#e5e7eb'),
            boxShadow:i===turn?'0 0 10px '+PC[i]+'55':'0 1px 4px rgba(0,0,0,0.08)'}}>
            <div style=${{display:'flex',alignItems:'center',gap:'5px',marginBottom:'3px'}}>
              <span>${PE[i]}</span>
              <span style=${{fontFamily:F.sans,fontWeight:800,fontSize:'0.82rem',color:PC[i],
                flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${p.name}</span>
              ${i===turn?html`<span style=${{fontFamily:F.sans,fontSize:'0.52rem',background:PC[i],
                borderRadius:'6px',padding:'1px 5px',color:'#fff',flexShrink:0}}>NOW</span>`:null}
            </div>
            <div style=${{fontFamily:F.sans,fontSize:'0.79rem',display:'flex',gap:'8px',flexWrap:'wrap'}}>
              <span>${'❤️'.repeat(Math.min(5,Math.max(0,p.hearts)))}${p.hearts>5?'+':''}${p.hearts<=0?'💀':''}</span>
              <span>🪙${p.coins}</span>
            </div>
            <div style=${{display:'flex',gap:'3px',marginTop:'3px',flexWrap:'wrap'}}>
              ${p.hasWeapon?html`<span style=${{fontFamily:F.sans,fontSize:'0.58rem',background:'#f3f4f6',
                border:'1px solid #e5e7eb',borderRadius:'4px',padding:'1px 4px'}}>🗡</span>`:null}
              ${p.hasPotion?html`<span style=${{fontFamily:F.sans,fontSize:'0.58rem',background:'#f3f4f6',
                border:'1px solid #e5e7eb',borderRadius:'4px',padding:'1px 4px'}}>💧</span>`:null}
              ${p.skipTurn?html`<span style=${{fontFamily:F.sans,fontSize:'0.58rem',background:'#fee2e2',
                border:'1px solid #fca5a5',borderRadius:'4px',padding:'1px 4px',color:'#991b1b'}}>⏭skip</span>`:null}
            </div>
            <div style=${{fontFamily:F.sans,fontSize:'0.58rem',color:'#9ca3af',marginTop:'2px'}}>
              Space ${p.pos}${p.pos===28?' 🐉 Roll a 9!':''}
            </div>
          </div>`)}
      </div>

      <!-- DICE + ROLL -->
      <div style=${{display:'flex',alignItems:'center',gap:'12px',justifyContent:'center',marginBottom:'8px'}}>
        <div style=${{width:'58px',height:'58px',borderRadius:'10px',userSelect:'none',
          background:rolling?'#f59e0b':'#fef3c7',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'1.8rem',fontFamily:F.head,color:'#78350f',
          border:'3px solid '+(rolling?'#d97706':'#92400e'),
          boxShadow:rolling?'0 0 14px rgba(245,158,11,0.6)':'0 3px 6px rgba(0,0,0,0.2)'}}>
          ${dice}
        </div>
        <button onClick=${doRoll} disabled=${!!modal||rolling}
          style=${{fontFamily:F.sans,fontWeight:800,borderRadius:'10px',border:'none',color:'#fff',
            padding:'13px 26px',fontSize:'1rem',
            background:(modal||rolling)?'#9ca3af':'linear-gradient(135deg,#16a34a,#059669)',
            cursor:(modal||rolling)?'not-allowed':'pointer',
            boxShadow:(modal||rolling)?'none':'0 4px 10px rgba(22,163,74,0.4)',
            opacity:(modal||rolling)?0.7:1}}>
          ${rolling?'🎲 Rolling...':'Roll'+(curP?' — '+curP.name:'')}
        </button>
      </div>

      <!-- LOG -->
      <div style=${{background:'#fff',border:'2px solid #e5e7eb',borderRadius:'8px',
        padding:'6px 10px',maxHeight:'84px',overflowY:'auto'}}>
        ${log.length===0?html`<div style=${{fontFamily:F.sans,fontSize:'0.7rem',color:'#d1d5db'}}>Game log appears here…</div>`:null}
        ${log.map((m,i)=>html`
          <div key=${i} style=${{fontFamily:F.sans,fontSize:'0.71rem',marginBottom:'2px',lineHeight:1.3,
            color:i===0?'#111827':'#9ca3af'}}>${m}</div>`)}
      </div>

      <!-- MODAL -->
      ${modal?html`
        <div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',display:'flex',
          alignItems:'center',justifyContent:'center',zIndex:50,padding:'16px'}}>
          <div style=${{background:'#fff',border:'3px solid #e5e7eb',borderRadius:'18px',
            padding:'24px 22px',width:'min(380px,93vw)',textAlign:'center',
            maxHeight:'85vh',overflowY:'auto',boxShadow:'0 20px 48px rgba(0,0,0,0.25)'}}>

            ${modal==='card'&&mdata?html`
              <div style=${{fontSize:'3.5rem',lineHeight:1,marginBottom:'8px'}}>${mdata.card.emoji}</div>
              <h2 style=${{fontFamily:F.head,fontSize:'1.5rem',color:'#b45309',margin:'0 0 6px'}}>${mdata.card.name}</h2>
              <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'22px',fontSize:'1rem'}}>${mdata.card.desc}</p>
              <button onClick=${()=>applyCard(mdata.card,mdata.pi,mdata.ps)}
                style=${{fontFamily:F.sans,fontWeight:800,borderRadius:'10px',border:'none',color:'#fff',
                  cursor:'pointer',background:'linear-gradient(135deg,#7c3aed,#6d28d9)',
                  padding:'11px 40px',boxShadow:'0 4px 10px rgba(124,58,237,0.4)'}}>OK!</button>`:null}

            ${modal==='shop'&&mdata?html`
              <h2 style=${{fontFamily:F.head,fontSize:'1.5rem',color:'#9d174d',margin:'0 0 4px'}}>🛒 Shop</h2>
              <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'14px',fontSize:'0.9rem'}}>
                ${mdata.ps[mdata.pi].name} has 🪙${mdata.ps[mdata.pi].coins}
              </p>
              ${[
                {id:'card',  emoji:'🃏',name:'Shop Card',   price:3,desc:'Draw a random SE card',can:mdata.ps[mdata.pi].coins>=3},
                {id:'potion',emoji:'💧',name:'Water Potion',price:2,desc:'Shortcut at the Fork!',can:mdata.ps[mdata.pi].coins>=2&&!mdata.ps[mdata.pi].hasPotion},
                {id:'banana',emoji:'🍌',name:'Banana',      price:1,desc:'+1 Heart',              can:mdata.ps[mdata.pi].coins>=1},
              ].map(item=>html`
                <button key=${item.id} onClick=${()=>{
                  if(!item.can) return;
                  const nps=mdata.ps.map(pl=>({...pl}));
                  if(item.id==='card'){
                    nps[mdata.pi].coins-=3; const c=rnd();
                    lg(nps[mdata.pi].name+' bought a Shop Card!');
                    setPlayers(nps); setMdata({card:c,pi:mdata.pi,ps:nps}); setModal('card');
                  } else if(item.id==='potion'){
                    nps[mdata.pi].coins-=2; nps[mdata.pi].hasPotion=true;
                    lg(nps[mdata.pi].name+' bought a Water Potion!');
                    setPlayers(nps); setMdata({pi:mdata.pi,ps:nps});
                  } else if(item.id==='banana'){
                    nps[mdata.pi].coins-=1; nps[mdata.pi].hearts+=1;
                    lg(nps[mdata.pi].name+' bought a Banana! +1 heart');
                    setPlayers(nps); setMdata({pi:mdata.pi,ps:nps});
                  }
                }} style=${{fontFamily:F.sans,fontWeight:700,display:'block',width:'100%',marginBottom:'8px',
                  background:item.can?'#fdf2f8':'#f9fafb',
                  border:'2px solid '+(item.can?'#f9a8d4':'#e5e7eb'),
                  opacity:item.can?1:0.45,cursor:item.can?'pointer':'not-allowed',
                  textAlign:'left',padding:'10px 14px',borderRadius:'10px',color:'#111827'}}>
                  <span style=${{marginRight:'8px',fontSize:'1.1rem'}}>${item.emoji}</span>
                  <strong>${item.name}</strong>
                  <span style=${{float:'right',color:'#b45309',fontWeight:700}}>🪙${item.price}</span>
                  <div style=${{fontFamily:F.sans,fontSize:'0.72rem',color:'#9ca3af',marginTop:'2px'}}>${item.desc}</div>
                </button>`)}
              <button onClick=${endTurn}
                style=${{fontFamily:F.sans,fontWeight:700,border:'2px solid #e5e7eb',borderRadius:'9px',
                  background:'#f9fafb',color:'#6b7280',cursor:'pointer',padding:'9px 28px',marginTop:'4px'}}>
                Leave Shop
              </button>`:null}

            ${modal==='ocean'&&mdata?html`
              <div style=${{fontSize:'3rem',lineHeight:1,marginBottom:'8px'}}>🌊</div>
              <h2 style=${{fontFamily:F.head,fontSize:'1.5rem',color:'#1d4ed8',margin:'0 0 6px'}}>Ocean!</h2>
              <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'20px',fontSize:'0.95rem'}}>
                ${mdata.ps[mdata.pi].name} hit the ocean! Choose:
              </p>
              <div style=${{display:'flex',gap:'10px'}}>
                <button onClick=${()=>{
                  const np=Math.max(0,mdata.pos-3);
                  const nps=mdata.ps.map(p=>({...p})); nps[mdata.pi].pos=np;
                  lg(nps[mdata.pi].name+' swims back 3 to space '+np);
                  setModal(null); setMdata(null); setPlayers(nps); land(mdata.pi,np,nps,0);
                }} style=${{fontFamily:F.sans,fontWeight:700,flex:1,background:'#eff6ff',
                  border:'2px solid #93c5fd',borderRadius:'10px',color:'#1d4ed8',
                  cursor:'pointer',padding:'10px 6px',fontSize:'0.85rem'}}>
                  🏊 Swim Back 3
                </button>
                <button onClick=${()=>{
                  const nps=mdata.ps.map(p=>({...p})); nps[mdata.pi].hearts-=1;
                  lg(nps[mdata.pi].name+' dives through! -1 heart');
                  const nd=deaths(nps); setPlayers(nd); endTurn();
                }} style=${{fontFamily:F.sans,fontWeight:700,flex:1,background:'#fff1f2',
                  border:'2px solid #fca5a5',borderRadius:'10px',color:'#991b1b',
                  cursor:'pointer',padding:'10px 6px',fontSize:'0.85rem'}}>
                  🤿 Dive (-1❤️)
                </button>
              </div>`:null}

            ${modal==='fork'&&mdata?html`
              <div style=${{fontSize:'3rem',lineHeight:1,marginBottom:'8px'}}>🍀</div>
              <h2 style=${{fontFamily:F.head,fontSize:'1.5rem',color:'#065f46',margin:'0 0 6px'}}>Fork!</h2>
              ${mdata.ps[mdata.pi].hasPotion?html`
                <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'20px',fontSize:'0.95rem'}}>
                  You have a 💧 Water Potion! Skip to the Finno Room?
                </p>
                <div style=${{display:'flex',gap:'10px'}}>
                  <button onClick=${()=>{
                    const nps=mdata.ps.map(pl=>({...pl}));
                    nps[mdata.pi].hasPotion=false; nps[mdata.pi].pos=28;
                    lg(nps[mdata.pi].name+' uses Water Potion — Finno Room!');
                    setModal(null); setMdata(null); setPlayers(nps); land(mdata.pi,28,nps,0);
                  }} style=${{fontFamily:F.sans,fontWeight:700,flex:1,background:'#f0fdf4',
                    border:'2px solid #86efac',borderRadius:'10px',color:'#166534',
                    cursor:'pointer',padding:'10px 6px',fontSize:'0.85rem'}}>
                    💧 Use Potion!
                  </button>
                  <button onClick=${endTurn}
                    style=${{fontFamily:F.sans,fontWeight:700,flex:1,background:'#f9fafb',
                      border:'2px solid #e5e7eb',borderRadius:'10px',color:'#6b7280',
                      cursor:'pointer',padding:'10px 6px',fontSize:'0.85rem'}}>
                    Continue
                  </button>
                </div>`:html`
                <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'20px',fontSize:'0.95rem'}}>
                  No Water Potion — taking the long path!
                </p>
                <button onClick=${endTurn}
                  style=${{fontFamily:F.sans,fontWeight:700,background:'#f9fafb',
                    border:'2px solid #e5e7eb',borderRadius:'10px',color:'#6b7280',
                    cursor:'pointer',padding:'10px 30px'}}>
                  Continue
                </button>`}`:null}

            ${modal==='attack'&&mdata?html`
              <div style=${{fontSize:'3rem',lineHeight:1,marginBottom:'8px'}}>⚔️</div>
              <h2 style=${{fontFamily:F.head,fontSize:'1.5rem',color:'#dc2626',margin:'0 0 6px'}}>Attack!</h2>
              <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'14px',fontSize:'0.9rem'}}>
                ${mdata.ps[mdata.pi].name}, choose a target:
              </p>
              ${mdata.ps.map((tgt,ti)=>{
                if(ti===mdata.pi) return null;
                return html`
                  <button key=${ti} onClick=${()=>{
                    const nps=mdata.ps.map(p=>({...p}));
                    if(nps[ti].hasWeapon){
                      nps[ti].hasWeapon=false;
                      lg(nps[ti].name+"'s Sword blocked the attack!");
                    } else {
                      nps[ti].hearts-=1;
                      lg(nps[mdata.pi].name+' attacks '+nps[ti].name+'! -1 heart');
                    }
                    const nd=deaths(nps); setPlayers(nd); endTurn();
                  }} style=${{fontFamily:F.sans,fontWeight:700,display:'block',width:'100%',marginBottom:'8px',
                    background:'#fff1f2',border:'2px solid '+PC[ti],borderRadius:'10px',
                    padding:'10px 14px',textAlign:'left',cursor:'pointer'}}>
                    <span style=${{marginRight:'8px'}}>${PE[ti]}</span>
                    <strong style=${{color:PC[ti]}}>${tgt.name}</strong>
                    <span style=${{float:'right',fontSize:'0.82rem',color:'#6b7280'}}>
                      ${'❤️'.repeat(Math.min(5,Math.max(0,tgt.hearts)))}${tgt.hasWeapon?' 🗡':''}
                    </span>
                  </button>`;
              })}`:null}

            ${modal==='finno'?html`
              <div style=${{fontSize:'4rem',lineHeight:1,marginBottom:'8px'}}>🐉</div>
              <h2 style=${{fontFamily:F.head,fontSize:'1.7rem',color:'#dc2626',margin:'0 0 6px'}}>FINNO ROOM!</h2>
              <p style=${{fontFamily:F.sans,color:'#6b7280',marginBottom:'22px',fontSize:'1rem'}}>
                You reached the dragon! Roll a
                <strong style=${{color:'#b45309',fontSize:'1.4rem'}}> 9</strong> next turn to win!
              </p>
              <button onClick=${endTurn}
                style=${{fontFamily:F.sans,fontWeight:700,background:'#292524',border:'2px solid #dc2626',
                  borderRadius:'10px',color:'#fca5a5',cursor:'pointer',padding:'11px 30px',fontSize:'1rem'}}>
                🐉 Face the Dragon
              </button>`:null}

          </div>
        </div>`:null}
    </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>

</body>
</html>
